name: Release

on:
    workflow_dispatch:
        inputs:
            acknowledge:
                description: 'I understand that this action will publish a new NPM, JSR & GitHub release.'
                required: true
                type: boolean

concurrency: release-${{ github.ref_name }}

env:
    TERM: xterm-256color
    NODE_VERSION: 24

jobs:
    release:
        name: Release
        if: ${{ inputs.acknowledge }}
        runs-on: ubuntu-latest
        permissions:
            contents: write # to be able to publish a GitHub release
            issues: write # to be able to comment on released issues
            pull-requests: write # to be able to comment on released pull requests
            id-token: write # to enable use of OIDC for npm provenance
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              timeout-minutes: 2
              with:
                  token: ${{ secrets.BOT_PAT }}

            - name: Import GPG key
              uses: crazy-max/ghaction-import-gpg@v6
              with:
                  gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
                  git_user_signingkey: true
                  git_config_global: true
                  git_commit_gpgsign: true
                  git_tag_gpgsign: false
                  git_push_gpgsign: false
                  git_committer_name: ${{ secrets.BOT_USERNAME }}
                  git_committer_email: ${{ secrets.BOT_EMAIL }}

            - uses: oven-sh/setup-bun@v2
              timeout-minutes: 2

            - name: Set up Node.js
              uses: actions/setup-node@v6
              timeout-minutes: 2
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Install npm dependencies
              timeout-minutes: 2
              run: |
                  bun install --frozen-lockfile

            - name: Bundle TypeScript
              timeout-minutes: 2
              run: |
                  bun run build:ci

            - name: Release to NPM & GitHub
              timeout-minutes: 10
              run: |
                  bun run release
              env:
                  GITHUB_TOKEN: ${{ secrets.BOT_PAT }}
                  GIT_AUTHOR_NAME: ${{ secrets.BOT_USERNAME }}
                  GIT_AUTHOR_EMAIL: ${{ secrets.BOT_EMAIL }}
                  GIT_COMMITTER_NAME: ${{ secrets.BOT_USERNAME }}
                  GIT_COMMITTER_EMAIL: ${{ secrets.BOT_EMAIL }}

            - name: Release to JSR
              timeout-minutes: 10
              run: |
                  bunx jsr publish
